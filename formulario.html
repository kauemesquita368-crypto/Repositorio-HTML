<!DOCTYPE html>
<html lang="pt=pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="formulario.html" method="post">
    <form action="receber-dados.html" method="POST">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome">

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email">
            <br>
            <input type="radio" name="sexo" value="masculino">masculino
            <input type="radio" name="sexo" value="feminino">feminino
            <br>
            <input type="checkbox" name="hobbies[]">Ouvir musica
            <input type="checkbox" name="hobbies[]">Jogar video game
            <input type="checkbox" name="hobbies[]">Tocar instrumentos

        <select id="estado">
            <option value="">Selecione</option>
            <option value="Acre">Acre</option>
            <option value="SP">São Paulo</option>
            <option value="MG">Minas Gerais</option>
        </select>
        <br>
        <fieldset>
            <br>
            <legend>Dados Pessoais</legend>
            <label for="nome">Nome</label>
            <input form="name" id="name">
            <label for="password">Senha</label>
            <input type="password" id="Senha">
            <label for="email">E-mail</label>
            <input type="email" id="email">
            <br>

            <label for="idade">Idade:</label>
            <input type="number" id="idade" name="idade" min="1" max="120" step="1" value="18">
            <br>

            <label for="points">Pontuacão</label>
            <input type="range" id="points" name="points" min="0" max="10">
            <br>

            <input type="text" placeholder="Digite seu nome">
            <input type="text" placeholder="Digite seu email" required>
            <input type="text" placeholder="Seu sobrenome" autofocus>
            <input type="text" placeholder="Não editavel" disabled>
            <br>
            <label for="data">Data:</label>
                <input type="date" id="data" name="data" min="1900-01-01" max="2020-12-31">
                <br>
                <label for="cor">Escolha uma cor</label>
                <input type="color">
                <label for="">Data e hora:</label>
                <input type="datetime-local">

                <label for="">Enviar arquivo:</label>
                <input type="file" accept="image/*">
                <br>

                <label for="">Seu site:</label>
                <input type="url">
                <button type="submit">Enviar</button>

                <label for="">Telefone</label>
                <input type="tel" pattern="[0-9]+" inputmode="numeric">

                <label for="">Buscar:</label>
                <input type="search">
<br>
                <label for="">Escolha um navegador</label>
                <input list="navegadores">
                <datalist id="navegadores">
                    <option value="Chrome"></option>
                     <option value="Firefox"></option>
                      <option value="Safari"></option>
                       <option value="Edge"></option>
                </datalist>

                <label for="">progresso:</label>
                <progress value="70" max="100"></progress>

        </form>
</body>
</html>
